version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        patterns:
          - "@types/*"
          - "vitest"
          - "@vitest/*"
          - "@biomejs/*"
          - "typescript"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
